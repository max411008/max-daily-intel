<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAX Daily Intel — {{DATE}}</title>
<style>
  :root {
    --bg: #0a0a0a;
    --card-bg: #141414;
    --card-border: #1e1e1e;
    --text: #e0e0e0;
    --text-dim: #888;
    --accent-crypto: #f7931a;
    --accent-gold: #ffd700;
    --accent-stocks: #4caf50;
    --accent-ai: #7c4dff;
    --accent-dev: #00bcd4;
    --link: #64b5f6;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
  }

  .container {
    max-width: 680px;
    margin: 0 auto;
    padding: 24px 16px 60px;
  }

  header {
    text-align: center;
    padding: 40px 0 32px;
    border-bottom: 1px solid var(--card-border);
    margin-bottom: 32px;
  }

  header h1 {
    font-size: 1.8rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin-bottom: 8px;
  }

  header .date {
    color: var(--text-dim);
    font-size: 0.9rem;
  }

  /* TOC */
  .toc {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 12px;
    padding: 16px 20px;
    margin-bottom: 32px;
  }

  .toc h2 {
    font-size: 0.8rem;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 12px;
  }

  .toc a {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 0;
    color: var(--text);
    text-decoration: none;
    font-size: 0.95rem;
    border-bottom: 1px solid var(--card-border);
    transition: color 0.2s;
  }

  .toc a:last-child { border-bottom: none; }
  .toc a:hover { color: var(--link); }

  .toc .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .toc .count {
    margin-left: auto;
    color: var(--text-dim);
    font-size: 0.8rem;
  }

  /* Sector */
  .sector {
    margin-bottom: 36px;
  }

  .sector-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
    padding-bottom: 8px;
    border-bottom: 2px solid var(--card-border);
  }

  .sector-header .indicator {
    width: 4px;
    height: 24px;
    border-radius: 2px;
  }

  .sector-header h2 {
    font-size: 1.2rem;
    font-weight: 600;
  }

  /* News card */
  .news-card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 12px;
    padding: 16px 20px;
    margin-bottom: 12px;
    transition: border-color 0.2s;
  }

  .news-card:hover {
    border-color: #333;
  }

  .news-card .source {
    font-size: 0.75rem;
    color: var(--text-dim);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .news-card h3 {
    font-size: 1rem;
    font-weight: 600;
    margin-bottom: 8px;
    line-height: 1.4;
  }

  .news-card h3 a {
    color: var(--text);
    text-decoration: none;
  }

  .news-card h3 a:hover {
    color: var(--link);
  }

  .news-card .summary {
    font-size: 0.9rem;
    color: var(--text-dim);
    line-height: 1.6;
  }

  .news-card .tags {
    margin-top: 10px;
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .news-card .tag {
    font-size: 0.7rem;
    padding: 2px 8px;
    border-radius: 999px;
    background: rgba(255,255,255,0.06);
    color: var(--text-dim);
  }

  /* Footer */
  footer {
    text-align: center;
    padding: 32px 0;
    border-top: 1px solid var(--card-border);
    color: var(--text-dim);
    font-size: 0.8rem;
  }

  footer a { color: var(--link); text-decoration: none; }

  /* Empty state */
  .empty {
    text-align: center;
    color: var(--text-dim);
    padding: 20px;
    font-style: italic;
  }

  /* Responsive */
  @media (max-width: 480px) {
    header h1 { font-size: 1.4rem; }
    .container { padding: 16px 12px 40px; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>MAX Daily Intel</h1>
    <div class="date">{{DATE_DISPLAY}}</div>
  </header>

  <nav class="toc">
    <h2>Today's Sectors</h2>
    <a href="#crypto"><span class="dot" style="background:var(--accent-crypto)"></span>Crypto / DeFi<span class="count">{{CRYPTO_COUNT}}</span></a>
    <a href="#gold"><span class="dot" style="background:var(--accent-gold)"></span>Gold / Commodities<span class="count">{{GOLD_COUNT}}</span></a>
    <a href="#stocks"><span class="dot" style="background:var(--accent-stocks)"></span>Stocks / Macro<span class="count">{{STOCKS_COUNT}}</span></a>
    <a href="#ai"><span class="dot" style="background:var(--accent-ai)"></span>AI Industry<span class="count">{{AI_COUNT}}</span></a>
    <a href="#dev"><span class="dot" style="background:var(--accent-dev)"></span>Dev Tools & Ideas<span class="count">{{DEV_COUNT}}</span></a>
  </nav>

  {{SECTORS_HTML}}

  <footer>
    <p>MAX Daily Intel — Powered by Claude Code</p>
    <p style="margin-top:4px"><a href="index.html">All Issues</a></p>
  </footer>
</div>
</body>
</html>
