<title>MAX Daily Intel</title>
<style>
  :root { --bg: #0a0a0a; --card-bg: #141414; --card-border: #1e1e1e; --text: #e0e0e0; --text-dim: #888; --link: #64b5f6; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  .container { max-width: 680px; margin: 0 auto; padding: 24px 16px 60px; }
  header { text-align: center; padding: 40px 0 32px; border-bottom: 1px solid var(--card-border); margin-bottom: 32px; }

  header p { color: var(--text-dim); font-size: 0.9rem; }
  .issue-list { list-style: none; }
  .issue-list li { border-bottom: 1px solid var(--card-border); }
  .issue-list a { display: block; padding: 16px 0; color: var(--text); text-decoration: none; transition: color 0.2s; }
  .issue-list a:hover { color: var(--link); }
  .issue-list .date { font-size: 1rem; font-weight: 600; }
  .issue-list .meta { font-size: 0.8rem; color: var(--text-dim); margin-top: 4px; }
  footer { text-align: center; padding: 32px 0; color: var(--text-dim); font-size: 0.8rem; }
</style>
</head>
