<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MAX 情報站">
<meta name="theme-color" content="#0a0a0a">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="manifest" href="manifest.json">
<title>MAX 每日情報站</title>
<style>
  :root {
    --bg: #0a0a0a;
    --card-bg: #1a1a1a;
    --card-border: #262626;
    --card-hover: #2a2a2a;
    --text: #f0f0f0;
    --text-secondary: #a0a0a0;
    --text-dim: #666;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'PingFang TC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    padding-top: var(--safe-top);
    padding-bottom: var(--safe-bottom);
  }
  .container { max-width: 600px; margin: 0 auto; padding: 16px 20px calc(40px + var(--safe-bottom)); }

  header {
    text-align: center;
    padding: 40px 0 28px;
    position: relative;
  }
  header::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 60px;
    height: 2px;
    background: linear-gradient(90deg, #a78bfa, #22d3ee);
    border-radius: 1px;
  }
  header .logo {
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  header h1 {
    font-size: 1.6rem;
    font-weight: 700;
    background: linear-gradient(135deg, #fff 0%, #aaa 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 6px;
  }
  header p {
    color: var(--text-secondary);
    font-size: 0.82rem;
    line-height: 1.6;
  }

  .sectors-bar {
    display: flex;
    justify-content: center;
    gap: 6px;
    padding: 16px 0 24px;
    font-size: 0.7rem;
    color: var(--text-dim);
    flex-wrap: wrap;
  }
  .sectors-bar span {
    padding: 3px 10px;
    border-radius: 999px;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
  }

  .issue-list { list-style: none; }

  .issue-card {
    display: block;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 16px;
    margin-bottom: 16px;
    overflow: hidden;
    color: var(--text);
    text-decoration: none;
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .issue-card:active {
    transform: scale(0.98);
  }
  .issue-card img {
    width: 100%;
    display: block;
  }
  .issue-card .info {
    padding: 14px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .issue-card .date {
    font-size: 0.9rem;
    font-weight: 600;
  }
  .issue-card .meta {
    font-size: 0.75rem;
    color: var(--text-secondary);
    background: rgba(255,255,255,0.05);
    padding: 3px 10px;
    border-radius: 999px;
  }

  footer {
    text-align: center;
    padding: 24px 0;
    font-size: 0.7rem;
    color: var(--text-dim);
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo">MAX Daily Intel</div>
    <h1>每日情報站</h1>
    <p>加密貨幣 / 黃金 / 股票 / AI / 開發靈感</p>
  </header>

  <div class="sectors-bar">
    <span>&#x1f4b0; 加密貨幣</span>
    <span>&#x1f947; 黃金商品</span>
    <span>&#x1f1f9;&#x1f1fc; 台股</span>
    <span>&#x1f1fa;&#x1f1f8; 美股</span>
    <span>&#x1f916; AI 產業</span>
    <span>&#x1f6e0;&#xfe0f; 開發靈感</span>
  </div>

  <ul class="issue-list">
    <li><a class="issue-card" href="2026-04-09.html">

        <span class="date">2026/04/09（四）</span>
        <span class="meta">9 則情報</span>
      </div>
    </a></li>
    <li><a class="issue-card" href="2026-04-08.html">

      <div class="info">
        <span class="date">2026/04/08（三）</span>
        <span class="meta">12 則情報</span>
      </div>
    </a></li>        <li><a class="issue-card" href="2026-04-13.html"><img src="cards/2026-04-13.png" alt="2026-04-13 每日情報摘要" loading="lazy"><div class="info"><span class="date">2026/04/13（一）</span><span class="meta">8 則情報</span></div></a></li>
    <li><a class="issue-card" href="2026-04-12.html"><img src="cards/2026-04-12.png" alt="2026-04-12 每日情報摘要" loading="lazy"><div class="info"><span class="date">2026/04/12（日）</span><span class="meta">9 則情報</span></div></a></li>
    <li><a class="issue-card" href="2026-04-11.html"><img src="cards/2026-04-11.png" alt="2026-04-11 每日情報摘要" loading="lazy"><div class="info"><span class="date">2026/04/11（六）</span><span class="meta">8 則情報</span></div></a></li>
    <li><a class="issue-card" href="2026-04-10.html"><img src="cards/2026-04-10.png" alt="2026-04-10 每日情報摘要" loading="lazy"><div class="info"><span class="date">2026/04/10（五）</span><span class="meta">7 則情報</span></div></a></li>

  </ul>

  <footer>Powered by Claude Code</footer>
</div>
</body>
</html>
