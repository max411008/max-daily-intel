<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=400">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 400px;
    min-height: 700px;
    font-family: -apple-system, 'PingFang TC', sans-serif;
    background: #0a0a0a;
    color: #f0f0f0;
    padding: 32px 28px;
    position: relative;
    overflow: hidden;
  }

  /* Ambient glow */
  body::before {
    content: '';
    position: absolute;
    top: -100px;
    right: -100px;
    width: 300px;
    height: 300px;
    background: radial-gradient(circle, rgba(167,139,250,0.12) 0%, transparent 70%);
    pointer-events: none;
  }
  body::after {
    content: '';
    position: absolute;
    bottom: -80px;
    left: -80px;
    width: 250px;
    height: 250px;
    background: radial-gradient(circle, rgba(34,211,238,0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  .header {
    text-align: center;
    margin-bottom: 24px;
    position: relative;
  }
  .header .logo {
    font-size: 0.6rem;
    letter-spacing: 0.25em;
    color: #555;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .header h1 {
    font-size: 1.3rem;
    font-weight: 700;
    background: linear-gradient(135deg, #fff, #aaa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 4px;
  }
  .header .date {
    font-size: 0.8rem;
    color: #888;
  }

  .divider {
    width: 40px;
    height: 2px;
    background: linear-gradient(90deg, #a78bfa, #22d3ee);
    border-radius: 1px;
    margin: 16px auto;
  }

  .item {
    display: flex;
    gap: 10px;
    margin-bottom: 14px;
    position: relative;
  }
  .item .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    margin-top: 8px;
    flex-shrink: 0;
  }
  .item .sector {
    font-size: 0.6rem;
    color: #666;
    font-weight: 600;
    letter-spacing: 0.05em;
    margin-bottom: 2px;
  }
  .item .title {
    font-size: 0.82rem;
    font-weight: 600;
    line-height: 1.4;
    margin-bottom: 3px;
  }
  .item .desc {
    font-size: 0.7rem;
    color: #888;
    line-height: 1.5;
  }

  .footer {
    text-align: center;
    margin-top: 20px;
    padding-top: 16px;
    border-top: 1px solid #1e1e1e;
    font-size: 0.65rem;
    color: #444;
  }
</style>
</head>
<body>
  <div class="header">
    <div class="logo">MAX Daily Intel</div>
    <h1>每日情報摘要</h1>
    <div class="date">2026 年 4 月 8 日（三）</div>
  </div>
  <div class="divider"></div>

  <div class="item">
    <div class="dot" style="background:#f7931a"></div>
    <div>
      <div class="sector">加密貨幣</div>
      <div class="title">BTC 突破 69K，伊朗談判帶動反彈</div>
      <div class="desc">ETF 單日淨流入 4.71 億，但仍卡在 7 萬以下</div>
    </div>
  </div>

  <div class="item">
    <div class="dot" style="background:#ffd700"></div>
    <div>
      <div class="sector">黃金商品</div>
      <div class="title">川普與伊朗「激烈談判」，黃金維持高檔</div>
      <div class="desc">荷姆茲海峽通行安全為關鍵變數</div>
    </div>
  </div>

  <div class="item">
    <div class="dot" style="background:#a78bfa"></div>
    <div>
      <div class="sector">AI 產業</div>
      <div class="title">Nvidia 投資 Firmus 估值達 55 億美元</div>
      <div class="desc">亞洲 AI 資料中心需求爆發</div>
    </div>
  </div>

  <div class="item">
    <div class="dot" style="background:#22d3ee"></div>
    <div>
      <div class="sector">開發靈感</div>
      <div class="title">Claude Mythos Preview 系統卡發布</div>
      <div class="desc">Glasswing 計畫：AI 時代軟體安全防護</div>
    </div>
  </div>

  <div class="footer">
    max411008.github.io/max-daily-intel
  </div>
</body>
</html>
